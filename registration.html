             }

      .navbar { padding-top:0.25rem; padding-bottom:0.25rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-black bg-light">
  <div class="container-fluid">

    <a class="navbar-brand" href="#"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQchdgIeG7ozkE0TV__FakwgnYka2ouCJgzNg&s" alt="oblogo" class="rounded-circle img-fluid" id="logo"></a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mynavbar">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="home.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="page2.1.html">Registration Form</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="page3.1.html">Confirmation Page</a>
        </li>
      </ul>

      <form class="d-flex">
        <input class="form-control me-2" type="text" placeholder="Search">
        <button class="btn btn-outline-primary" type="button">Search</button>
      </form>
    </div>
  </div>
</nav>

<div class="container bg-light p-4 rounded shadow">

    <form>
          <input id="profile" type="file" accept="image/*" style="display:none">
          <label for="profile" style="color:#06c;cursor:pointer;text-decoration:underline;font-size:small">
  Click here to choose a profile picture (optional)
          </label>
        
        <h4 class="text-primary">Basic Information</h4>
        <div class="row mb-3">
            <div class="col-md-4">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" required placeholder="Mcdonnell Douglas">
            </div>
            <div class="col-md-4">
                <label class="form-label">Birthday</label>
                <input type="date" class="form-control" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Gender</label>
                <select class="form-select" required>
                    <option disabled selected>Select gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Non-Binary</option>
                    <option>Trasgender</option>
                </select>
            </div>
        </div>

        <hr>

      
        <h4 class="text-primary">Contact Information</h4>
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Contact Number</label>
                <input type="tel" class="form-control" required placeholder="63+">
            </div>
            <div class="col-md-6">
                <label class="form-label">Personal Email</label>
                <input type="email" class="form-control" required placeholder="email@gmail.com">
            </div>
        </div>

        <h4 class="text-primary">Additional Details</h4>
        <div class="row mb-3">
            <div class="col-md-4">
                <label class="form-label">City of Residence</label>
                <input type="text" class="form-control" required placeholder="Novaliches, Quezon City">
            </div>

            <div class="col-md-4">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" required placeholder="Professor Poopypants">
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Submit Registration</button>

    </form>
</div>

<br><br>

</body>
</html>

</body>
</html>
